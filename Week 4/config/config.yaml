# Groq
groq:
  model: llama-3.1-8b-instant
  temperature: 0.7
  max_tokens: 100
  base_url: "https://api.groq.com/openai/v1"

# Supabase
supabase:
  host: db.ewcugkjfmcxnwafzhqdf.supabase.co
  port: 5432
  database: postgres
  user: postgres

# Text Chunking
chunking:
  book_file: "Alice's Adventures in Wonderland by Lewis Carroll.txt"
  # book_file: "Pride and Prejudice by Jane Austen.txt"
  # book_file: "Romeo and Juliet by William Shakespeare.txt"
  # book_file: "Frankenstein; or, the modern prometheus by Mary Wollstonecraft Shelley.txt"
  fixed_size:
    chunk_size: 1000
    overlap: 200
  sentence:
    max_sentences: 8
    overlap_sentences: 2
  paragraph:
    min_chars: 80
  token:
    chunk_size: 400
    overlap: 50

# Embedding
embedding:
  model: "BAAI/bge-m3"
  batch_size: 16
  max_length: 512
  num_chunks_embed: 400

# Retrieval
retrieval:
  top_k: 5
